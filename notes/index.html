<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <base href="/Ruslan/" />
    <meta name="viewport" content="width=device-width" />
    <meta name="description" content="Notes and references." />
    <title>Notes | Ruslan Amruddin</title>
    <link rel="stylesheet" href="styles/global.css" />
    <script>
      (() => {
        try {
          const storageKey = "research-archive-theme";
          const saved = window.localStorage.getItem(storageKey);
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = saved === "light" || saved === "dark" ? saved : "light";
          document.documentElement.dataset.theme = theme;
        } catch { document.documentElement.dataset.theme = "light"; }
      })();
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <div class="site-shell">
      <header class="site-header">
        <a class="site-brand" href="./" target="_top">R. Amruddin</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="notes/">Notes</a>
        </nav>
        <div class="site-actions">
          <button id="theme-toggle" class="text-button" type="button" aria-label="Toggle color theme" aria-pressed="false">dark</button>
          <button class="text-button" type="button" data-command-open>&#8984;K</button>
        </div>
      </header>

      <main id="main-content" class="site-main">
        <section class="page-head">
          <h1>Notes</h1>
          <p>References, reading notes, and short-form writing. In preparation.</p>
        </section>
        <section class="notes-sheet">
          <p class="muted">Nothing here yet — check back soon.</p>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; 2026 — Last updated Feb 2026</p>
      </footer>
    </div>

    <div class="command-palette" id="command-palette" hidden>
      <button class="command-backdrop" data-command-close aria-label="Close command palette"></button>
      <div class="command-dialog" role="dialog" aria-label="Command palette">
        <div class="command-header">
          <h2>Go to project</h2>
          <button class="text-button" data-command-close type="button">Esc</button>
        </div>
        <input id="command-search" type="text" placeholder="Search projects..." autocomplete="off" />
        <ul class="command-results" id="command-results"></ul>
      </div>
    </div>

    <script src="scripts/shared.js"></script>
  </body>
</html>
